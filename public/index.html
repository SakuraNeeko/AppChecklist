<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Cultivo - Cananvalle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container" id="reporteArea">
    <h2>🌿 Checklist Cultivo - Cananvalle</h2>
    
    <div class="form-group" data-html2canvas-ignore="true">
        <label>Semana:</label> <input type="number" id="semana" value="35">
        <label>Área:</label> <input type="number" id="area" value="3">
        <button class="btn" onclick="crearReporte()">Iniciar Nuevo Reporte</button>
    </div>

    <hr>

    <h3 style="margin-bottom: 5px;">Registro Diario</h3>
    <p style="font-size: 12px; color: #666; margin-top: 0;">ID Reporte Activo: <strong id="lblReporteId" style="color: #d32f2f;">Ninguno</strong></p>

    <table>
        <thead>
            <tr>
                <th>Colaborador</th>
                <th>Desyeme</th>
                <th>Encanastado</th>
                <th>Firma del Colaborador</th>
                <th data-html2canvas-ignore="true">Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" id="colaborador" placeholder="Ej. AVILA FONTE MARIA..."></td>
                <td><input type="number" id="desyeme" min="0" max="1" value="1"></td>
                <td><input type="number" id="encanastado" min="0" max="1" value="1"></td>
                <td style="text-align: center;">
                    <canvas id="firmaCanvas" width="220" height="80"></canvas>
                    <br>
                    <button class="btn btn-clear" data-html2canvas-ignore="true" onclick="limpiarFirma()">Borrar Firma</button>
                </td>
                <td data-html2canvas-ignore="true">
                    <button class="btn" onclick="guardarFila()">Guardar</button>
                </td>
            </tr>
        </tbody>
    </table>

    <br>
    <button class="btn btn-close" data-html2canvas-ignore="true" onclick="generarPDF()">🔒 Cerrar Reporte y Descargar PDF</button>
</div>

<script>
    let reporteIdActual = null;
    const canvas = document.getElementById('firmaCanvas');
    const ctx = canvas.getContext('2d');
    let dibujando = false;

    // Lógica para Mouse
    canvas.addEventListener('mousedown', (e) => { dibujando = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
    canvas.addEventListener('mousemove', (e) => { if (dibujando) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); }});
    canvas.addEventListener('mouseup', () => { dibujando = false; });
    canvas.addEventListener('mouseleave', () => { dibujando = false; });

    // Lógica para Táctil (Pantallas de Celular)
    canvas.addEventListener('touchstart', (e) => {
        dibujando = true;
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        ctx.beginPath();
        ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
        e.preventDefault();
    }, {passive: false});
    
    canvas.addEventListener('touchmove', (e) => {
        if (dibujando) {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
            ctx.stroke();
            e.preventDefault();
        }
    }, {passive: false});

    canvas.addEventListener('touchend', () => { dibujando = false; });

    function limpiarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // Conexión con Supabase a través de Vercel (Backend)
    async function crearReporte() {
        const semana = document.getElementById('semana').value;
        const area = document.getElementById('area').value;
        
        try {
            const res = await fetch('/api/reportes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ semana, area })
            });
            const data = await res.json();
            if(data.success) {
                reporteIdActual = data.reporteId;
                document.getElementById('lblReporteId').innerText = reporteIdActual;
                document.getElementById('lblReporteId').style.color = "#4c9a2a";
                alert("✅ Reporte creado. Ya puedes guardar los registros de los colaboradores.");
            } else {
                alert("Error: " + data.error);
            }
        } catch (error) {
            alert("Error de conexión al iniciar reporte.");
        }
    }

    async function guardarFila() {
        if (!reporteIdActual) { alert("⚠️ Debes Iniciar un Nuevo Reporte primero."); return; }

        const colaborador = document.getElementById('colaborador').value;
        if (!colaborador) { alert("⚠️ Ingresa el nombre del colaborador."); return; }

        const desyeme = document.getElementById('desyeme').value;
        const encanastado = document.getElementById('encanastado').value;
        const firmaBase64 = canvas.toDataURL('image/png'); 

        try {
            const res = await fetch('/api/registros', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reporteId: reporteIdActual, colaborador, desyeme, encanastado, firmaBase64 })
            });

            const data = await res.json();
            if(data.success){
                alert("💾 " + data.message);
                document.getElementById('colaborador').value = ""; // Limpiar para el siguiente
                limpiarFirma();
            } else {
                alert("Error al guardar: " + data.error);
            }
        } catch (error) {
            alert("Error de conexión al guardar fila.");
        }
    }

    function generarPDF() {
        window.html2canvas(document.getElementById('reporteArea')).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const pdf = new window.jspdf.jsPDF('p', 'mm', 'a4');
            const imgProps= pdf.getImageProperties(imgData);
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
            
            pdf.addImage(imgData, 'PNG', 0, 10, pdfWidth, pdfHeight);
            pdf.save(`Checklist_Cananvalle_Semana_${document.getElementById('semana').value}.pdf`);
        });
    }
</script>
</body>
</html>
